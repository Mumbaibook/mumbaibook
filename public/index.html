<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Book</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a2463, #3e92cc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            display: flex;
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .logo-section {
            flex: 1;
            background: linear-gradient(to right, #0a2463, #3e92cc);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background-color: #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo h1 {
            font-size: 24px;
            color: #0a2463;
            font-weight: bold;
        }
        
        .logo-section h2 {
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .form-section {
            flex: 1;
            padding: 40px;
            position: relative;
        }
        
        .form-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .tab-container {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #777;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #0a2463;
            border-bottom: 3px solid #d4af37;
        }
        
        .form {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .form.active {
            display: flex;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-group label {
            font-size: 14px;
            color: #555;
            font-weight: bold;
        }
        
        .input-group input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            border-color: #3e92cc;
            outline: none;
            box-shadow: 0 0 0 3px rgba(62, 146, 204, 0.2);
        }
        
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .btn-primary {
            background-color: #d4af37;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #c9a227;
        }
        
        .forgot-password {
            text-align: right;
            font-size: 13px;
            color: #777;
            cursor: pointer;
        }
        
        .forgot-password:hover {
            color: #3e92cc;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .logo-section {
                padding: 30px;
            }
            
            .logo {
                width: 80px;
                height: 80px;
            }
            
            .logo h1 {
                font-size: 18px;
            }
            
            .logo-section h2 {
                font-size: 20px;
            }
            
            .form-section {
                padding: 30px;
            }
        }

        .admin-login-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #777;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
            opacity: 0.7;
        }

        .admin-login-link:hover {
            opacity: 1;
            color: #d4af37;
        }

        /* Add modal styles */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .admin-modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }

        .admin-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admin-modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #777;
        }
    </style>
    <!-- Load CONFIG first -->
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <h1>MB</h1>
            </div>
            <h2>Mumbai Book</h2>
            <p>Your premier betting platform</p>
        </div>
        
        <div class="form-section">
            <div class="form-container">
                <div class="tab-container">
                    <div class="tab active" onclick="switchTab('login')">Login</div>
                    <div class="tab" onclick="switchTab('register')">Register</div>
                </div>
                
                <form id="login-form" class="form active" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    
                    <div class="forgot-password" onclick="alert('Please contact admin to reset your password')">
                        Forgot Password?
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                
                <form id="register-form" class="form" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label for="register-mobile">Mobile Number</label>
                        <input type="tel" id="register-mobile" placeholder="Enter your mobile number" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" placeholder="Choose a username" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="Create a password" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" placeholder="Confirm your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <div class="admin-login-link" onclick="showAdminLogin()">Admin</div>

    <!-- Add admin login modal -->
    <div id="adminModal" class="admin-modal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h3>Admin Login</h3>
                <span class="admin-modal-close" onclick="hideAdminLogin()">&times;</span>
            </div>
            <form onsubmit="handleAdminLogin(event)">
                <div class="input-group">
                    <label for="admin-username">Username</label>
                    <input type="text" id="admin-username" placeholder="Admin username" required>
                </div>
                <div class="input-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="Admin password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login as Admin</button>
            </form>
        </div>
    </div>
    
    <script>
        // Initialize users if not exists
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([]));
        }

        // Handle Registration
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const mobile = document.getElementById('register-mobile').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check if username already exists
            if (users.some(user => user.username === username)) {
                alert('Username already exists!');
                return;
            }

            // Check if mobile already exists
            if (users.some(user => user.mobile === mobile)) {
                alert('Mobile number already registered!');
                return;
            }

            const newUser = {
                userId: Date.now(),
                username,
                password, // In a real app, you should hash the password
                mobile,
                walletBalance: 0,
                devices: []
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('Registration successful! Please login.');
            switchTab('login');
            event.target.reset();
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${CONFIG.API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store user data in session
                sessionStorage.setItem('currentUser', JSON.stringify({
                    userId: data.userId,
                    username: data.username,
                    deviceId: data.deviceId,
                    walletBalance: data.walletBalance
                }));

                window.location.href = 'dashboard.html';
            } catch (error) {
                alert(error.message);
            }
        }

        // Handle Admin Login
        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            
            const adminUsername = "Jayramgnana";
            const adminPassword = "Jayram@gnana";
            
            if (username === adminUsername && password === adminPassword) {
                sessionStorage.setItem('adminUser', JSON.stringify({
                    username: adminUsername,
                    isAdmin: true
                }));
                window.location.href = 'admin.html';
            } else {
                alert('Invalid admin credentials');
            }
        }

        // Switch between login and register tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.querySelectorAll('.form').forEach(form => {
                form.classList.remove('active');
            });
            
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-form`).classList.add('active');
        }

        // Admin modal functions
        function showAdminLogin() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        function hideAdminLogin() {
            document.getElementById('adminModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) {
                hideAdminLogin();
            }
        }
    </script>
</body>
</html>
